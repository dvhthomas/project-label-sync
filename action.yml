name: 'Project Label Sync'
description: 'Bidirectional sync between GitHub Projects v2 status fields and issue labels'
branding:
  icon: 'refresh-cw'
  color: 'blue'
inputs:
  token:
    description: 'Classic PAT with project + repo scopes (GITHUB_TOKEN cannot access projects)'
    required: true
  config:
    description: 'Path to config file'
    required: false
    default: '.github/project-label-sync.yml'
  apply:
    description: 'Apply changes (create labels, sync issues). Without this, the Action only reports what would change.'
    required: false
    default: 'false'
runs:
  using: 'docker'
  image: 'Dockerfile'
